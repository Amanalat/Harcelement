<style>
#mc{border-radius:8px;border:1px solid #dadada;box-shadow:0 1px 6px rgba(0,0,0,.12);overflow:hidden;font-family:Arial,sans-serif;background:#e8f4e2;}
#map-wrap{position:relative;width:100%;}
#map-svg{width:100%;display:block;}
#back-btn{position:absolute;top:8px;left:8px;z-index:5;background:rgba(255,255,255,.93);border:none;border-radius:16px;padding:5px 12px 5px 8px;font-size:12px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.22);display:none;align-items:center;gap:4px;color:#444;font-family:Arial,sans-serif;}
#back-btn.show{display:flex;}
.h-zone{cursor:pointer;}
.h-pulse{fill:rgba(41,110,220,.13);transition:r .2s,opacity .2s;}
.h-dot{transition:r .2s;}
.h-zone:hover .h-pulse{opacity:.9;}
.h-zone:hover .h-dot{r:5;}
.h-lbl{pointer-events:none;}
#zoom-ctrl{position:absolute;right:10px;top:50%;transform:translateY(-50%);z-index:5;display:flex;flex-direction:column;gap:4px;}
#zoom-ctrl button{width:30px;height:30px;border:none;border-radius:6px;background:rgba(255,255,255,.93);box-shadow:0 1px 4px rgba(0,0,0,.22);font-size:16px;cursor:pointer;color:#444;display:flex;align-items:center;justify-content:center;line-height:1;}
#zoom-ctrl button:hover{background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.28);}
#panel{position:fixed;bottom:0;left:0;right:0;max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1);background:#fff;border-top:2px solid #e8e8e8;box-shadow:0 -2px 12px rgba(0,0,0,.15);z-index:100;}
#panel.open{max-height:55vh;}
#panel-inner{padding:4px 14px 14px;overflow-y:auto;max-height:calc(55vh - 32px);}
#panel-close{display:block;text-align:center;cursor:pointer;padding:5px 0 2px;line-height:1;position:sticky;top:0;background:#fff;z-index:1;}
#panel-close svg{transition:transform .2s;}
#panel-close:hover svg{transform:translateY(2px);}
#panel-top{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;}
#panel-title{margin:0;font-size:14px;font-weight:700;color:#1a1a1a;}
#panel-desc{margin:0;font-size:11px;color:#999;}
.photos-row{display:flex;gap:8px;}
.photo-slot{width:72px;height:54px;flex:none;background:#f6f6f6;border:1.5px dashed #d2d2d2;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;overflow:hidden;}
.photo-slot:hover{background:#eef4ff;border-color:#90b8f5;}
.photo-slot .ph-label{font-size:9px;color:#bbb;margin-top:5px;text-align:center;line-height:1.3;}
.photo-slot img{width:100%;height:100%;object-fit:cover;display:block;border-radius:4px;}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;align-items:center;justify-content:center;cursor:pointer;}
#lightbox.open{display:flex;}
#lightbox img{max-width:92vw;max-height:88vh;border-radius:8px;box-shadow:0 4px 32px rgba(0,0,0,.5);}
#lightbox-close{position:absolute;top:14px;right:18px;color:#fff;font-size:28px;cursor:pointer;line-height:1;}

#annuaire-panel{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;}
#annuaire-panel.open{display:flex;}
#annuaire-box{background:#fff;border-radius:12px;width:420px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.25);overflow:hidden;}
#annuaire-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee;background:#f8f8f8;}
#annuaire-header h3{margin:0;font-size:15px;color:#1a1a1a;}
#annuaire-close{background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1;padding:0 4px;}
#annuaire-search{padding:8px 12px;border-bottom:1px solid #eee;}
#annuaire-search input{width:100%;box-sizing:border-box;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none;}
#annuaire-search input:focus{border-color:#90b8f5;}
#annuaire-list{overflow-y:auto;flex:1;}
#annuaire-list table{width:100%;border-collapse:collapse;font-size:13px;}
#annuaire-list tr:nth-child(even){background:#f9f9f9;}
#annuaire-list td{padding:7px 12px;border-bottom:1px solid #f0f0f0;}
#annuaire-list td:last-child{color:#555;font-family:monospace;font-size:12px;}
#annuaire-btn{display:inline-flex;align-items:center;gap:5px;margin-top:6px;padding:4px 10px;background:#1a73e8;color:#fff;border:none;border-radius:12px;font-size:11px;cursor:pointer;}
#annuaire-btn:hover{background:#1558c0;}
#restaurants-section{margin-top:12px;}
#restaurants-section h4{margin:0 0 8px;font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.8px;}
.resto-list{display:flex;gap:8px;flex-wrap:wrap;}
.resto-card{background:#fffbf2;border:1px solid #f0e0b0;border-radius:8px;padding:8px 11px;min-width:130px;flex:1;}
.resto-card .resto-nom{font-size:12px;font-weight:700;color:#b05a00;margin-bottom:3px;}
.resto-card .resto-proprio{font-size:11px;color:#555;margin-bottom:2px;}
.resto-card .resto-tel{font-size:11px;color:#1a73e8;font-family:monospace;}
.resto-card .resto-desc{font-size:11px;color:#666;line-height:1.45;margin-top:4px;font-style:italic;}
#poi-section{margin-top:12px;}
#poi-section h4{margin:0 0 8px;font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.8px;}
.poi-list{display:flex;flex-direction:column;gap:7px;}
.poi-card{background:#f0f7ff;border:1px solid #c5ddf7;border-radius:8px;padding:8px 11px;}
.poi-card .poi-nom{font-size:12px;font-weight:700;color:#1a4e8c;margin-bottom:2px;}
.poi-card .poi-desc{font-size:11px;color:#444;line-height:1.45;}
</style>

function easeInOut(t){ return t<.5 ? 2*t*t : -1+(4-2*t)*t; }

function animVB(from, to, dur, cb){
  if(rafId) cancelAnimationFrame(rafId);
  const s = performance.now();
  function frame(now){
    const t = Math.min((now-s)/dur, 1);
    const e = easeInOut(t);
    const vb = from.map((v,i)=> v+(to[i]-v)*e);
    document.getElementById('map-svg').setAttribute('viewBox', vb.join(' '));
    curVB = vb;
    if(t<1){ rafId = requestAnimationFrame(frame); }
    else { rafId = null; cb&&cb(); }
  }
  rafId = requestAnimationFrame(frame);
}

function openAnnuaire(id){
  if(!id) return;
  const h = HAMEAUX[id];
  _annuaireData = ANNUAIRE[id] || [];
  document.getElementById('annuaire-title').textContent = 'Annuaire — ' + h.nom + ' (' + _annuaireData.length + ')';
  document.getElementById('annuaire-input').value = '';
  renderAnnuaire(_annuaireData);
  document.getElementById('annuaire-panel').classList.add('open');
}
function closeAnnuaire(){
  document.getElementById('annuaire-panel').classList.remove('open');
}
function renderAnnuaire(list){
  const t = document.getElementById('annuaire-table');
  t.innerHTML = list.map(p=>`<tr><td>${p.n}</td><td>${p.t}</td></tr>`).join('');
}
function filterAnnuaire(){
  const q = document.getElementById('annuaire-input').value.toLowerCase();
  renderAnnuaire(_annuaireData.filter(p=>p.n.toLowerCase().includes(q)));
}

function selectHameau(id){
  currentHameau = id;
  const h = HAMEAUX[id];
  document.getElementById('panel-title').textContent = h.nom;
  document.getElementById('panel-desc').textContent = h.desc;
  const row = document.getElementById('photos-row');
  row.innerHTML = '';
  const assigned = PHOTO_MAP[id] || [];
  const slots = 3;
  for(let i=0;i<slots;i++){
    if(assigned[i]){
      const p = assigned[i];
      row.innerHTML += `<div class="photo-slot" onclick="openLightbox('${p.src}','${p.alt}')" title="${p.alt}"><img src="${p.src}" alt="${p.alt}"/></div>`;
    } else {
      row.innerHTML += `<div class="photo-slot" title="Photo à ajouter">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="5" width="18" height="13" rx="2.5" stroke="#ccc" stroke-width="1.5"/>
          <circle cx="11" cy="12" r="3.5" stroke="#ccc" stroke-width="1.5"/>
          <path d="M7.5 5L9 2.5H13L14.5 5" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="17" cy="8" r="1" fill="#ccc"/>
        </svg>
        <span class="ph-label">Photo à<br>ajouter</span>
      </div>`;
    }
  }
  document.getElementById('panel').classList.add('open');
  // Restaurants
  const restos = RESTAURANTS[id] || [];
  const restoList = document.getElementById('resto-list');
  restoList.innerHTML = restos.map(r =>
    `<div class="resto-card">
      <div class="resto-nom">${r.nom}</div>
      <div class="resto-desc">${r.desc.replace(r.proprio, `<strong>${r.proprio}</strong>`)}</div>
    </div>`
  ).join('');

  const pois = POIS[id] || [];
  const poiList = document.getElementById('poi-list');
  poiList.innerHTML = pois.map(p =>
    `<div class="poi-card">
      <div class="poi-nom">${p.emoji} ${p.nom}</div>
      <div class="poi-desc">${p.desc.replace(p.contact, `<strong>${p.contact}</strong>`)}</div>
    </div>`
  ).join('');
}

function openLightbox(src, alt){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-img').alt = alt;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}

function zoomIn(){
  const cx = curVB[0]+curVB[2]/2, cy = curVB[1]+curVB[3]/2;
  const nw = Math.max(200, curVB[2]*0.7), nh = Math.max(110, curVB[3]*0.7);
  animVB(curVB, [cx-nw/2, cy-nh/2, nw, nh], 350);
}
function zoomOut(){
  const cx = curVB[0]+curVB[2]/2, cy = curVB[1]+curVB[3]/2;
  const nw = Math.min(DEFAULT_VB[2], curVB[2]/0.7), nh = Math.min(DEFAULT_VB[3], curVB[3]/0.7);
  const vx = Math.max(0, Math.min(DEFAULT_VB[2]-nw, cx-nw/2));
  const vy = Math.max(0, Math.min(DEFAULT_VB[3]-nh, cy-nh/2));
  animVB(curVB, [vx, vy, nw, nh], 350);
}
function zoomReset(){ animVB(curVB, DEFAULT_VB, 350); }
function resetZoom(){
  animVB(curVB, DEFAULT_VB, 520);
  document.getElementById('panel').classList.remove('open');
  document.getElementById('back-btn').classList.remove('show');
}
